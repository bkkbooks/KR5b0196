body:
  text: 玉籙資度早朝儀玉籙資度午朝儀玉籙資度晚朝儀玉籙資度早朝儀法事如式各禮師存念如法請宣神呪青陽虛映曜日回靈神虎辟邪飛天流鈴摧奸滅試萬魔東形九微回道八威攝精千真校録三元蕩清左嘯中黃右第六丁七轉八合周旋天經聖化巍巍大道興行慶雲流布合景黃庭鳴法鼓二十四通無上三天玄元始三氣太上道君太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝顯服冠帶垂纓關啓玄壇土地方域神真臣今早朝升壇行道謹奏為入意其諸忱悃巳録告聞願得太上十方至真道氣靈寶慧光下降流入臣等身中令臣所啓速逹徑御太上無極大道三清上聖昊天金闕玉皇上帝東極慈尊青玄上帝道前請稱法位具位臣姓某與臨壇官衆等謹同誠上啓虛無自然至真無極大道元始天尊太上道君太上老君高上玉皇上帝紫微北極大帝紫微天皇大帝后土皇地祇東極青華大帝南極長生大帝無上玉帝玉虛上帝東華南極西靈北真玄都玉京金闕七寶瓊臺紫微上宮靈寶至真明皇道君十方巳得道大聖衆至真諸君丈人大慈大悲救苦真人救度真人大惠真人注生真人普救真人香林㑹中法解真人三十六部尊經玄中大法師三天大法師靈寶經籍度三師真君正一嗣系女三師真君三界官屬一切真靈臣聞赤明開圖敷三元於祖氣青玄御運宏十極之真光威神凝妙於紫金慧力敷華於翠玉香林駐景琅音尊應念之慈騫𣗳騰輝瓊號表尋聲之惠二府雲聮而宗德九司星列以推仁赫赫靈功巍巍聖化臣等福由宿慶運際昌期佩妙戒於身前希夷師錫擊鸞圖於肘後微妙天開莫高蹈於鵬摶乃卑棲而駒逐學真補過退堅勵巳之誠宏道立功進勉度人之力恭承上命敢不告聞以今欽奉綸音崇修玉籙資薦某靈虔潔巳以輸誠謹齊心而瀝悃歸心東極願開甘露之門薦福某靈早證紫虛之位恩流宗社澤被人天以今早朝升壇行道請法衆等運兹初捻上香願此香煙騰空徑上供養無上至真道寶臣等皈身皈神皈命首體投地仰依太上三尊十方衆聖願以是香功德端為某靈增崇天福登進仙階恭願凝神空碧高步始青擁環珮以朝元慶延聖祚被藻旒而問道祥衍神斿今故燒香自皈依師尊大聖衆至真之德得道之後保天長存和與道合真以今早朝陛壇行道請法衆等運兹二捻上香願此香煙騰空徑上供養無上至真經寶臣等皈身皈神皈命首體投地仰依太上三尊十方衆聖願以是香功德端為某靈登真快樂進陟逍遙恭願天詔下頒玄恩誕錫翠華寶幄升雲衢而直上朱陵玉輦丹輿朝西靈而高居絳闕推恩寶祚垂裕金枝今故燒香自皈依師尊大聖衆至真之德得道之後升入無形和與道合真以今早朝陛壇行道請法衆等運兹三捻上香願此香煙騰空徑上供養無上至真師寶臣等皈身皈神皈命首體投地仰依太上三尊十方衆聖願以是香功德端為某靈悟道登真凝神入妙恭願紫府成真玄都錫命金輿羽葆沖清虛而歸大梵之天鳯表鸞姿步瑶華而陟閬苑之境慈澤永流於百世仁恩啓佑於萬年今故燒香自皈依師尊大聖衆至真之德得道之後永保長存和與道合真唱方懴方三啓三禮重稱法位具位臣姓某與臨壇官衆等謹同誠上啓三清上聖東極慈尊三界真仙無鞅衆聖醮筵設像一切真靈恭望洪慈洞垂昭鑒臣聞道尊太一端神化於十方教衍大千流玄恩於鬱絶凝虛無之玉相承元始之金光百寶流明開晨輝於夜壑九微回曜啓朝景於寒庭庶提風澤之幽𡪹均步雲霄之渺莽以今欽奉綸音爰遵蘂笈肅建芝壇誕修玉籙之妙齊庸薦真靈之冥福聞經聽法朝獅御以依光度命登真步龍墀而御景慶延宗社澤被顯幽上願乾樞澄湛坤軸清凝日月輝華山河寧謐三烽息警貔貅樂意於堯疆五榖告成鴻鴈棲身於舜畝夜壑遂仙飛之樂寒庭無校録之虞動植飛潜俱承惠澤四生六道悉被慈雲則上明天尊大慈之化下副臣等皈命之誠謹啓以聞發願存神燒香香官使者左右龍虎君侍香諸靈官當令臣向來早朝升壇行道之所自然生金液丹碧之英百靈衆真交㑹在此香火爐前當願誠意感通真靈升度克證神仙之果普資家國之恩十方仙童玉女接侍蘭煙傳臣向來所啓之誠速逹徑御至真無極大道三清上聖昊天金闕玉皇上帝東極慈尊青玄上帝道前出堂頌玉籙資度早朝儀
